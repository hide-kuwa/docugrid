name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: pytest
        env:
          DOCUGRID_ALLOW_HEADER_AUTH: "true"
        run: python -m pytest -q

  production-config:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Validate production env template
        run: |
          export DOCUGRID_ENV=production
          export DOCUGRID_JWT_SECRET="$(python -c 'import secrets; print(secrets.token_urlsafe(48))')"
          export GOOGLE_OAUTH_CLIENT_ID=test.apps.googleusercontent.com
          export DOCUGRID_CORS_ORIGINS=https://app.example.com
          export DOCUGRID_ALLOW_HEADER_AUTH=false
          export DOCUGRID_ALLOW_PASSWORD_LOGIN=false
          mkdir -p storage
          echo '{"emailToStakeholderId":{"ops@example.com":"actor-admin"}}' > storage/member_directory.json
          python scripts/validate_production_env.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
